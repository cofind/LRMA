name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🚀 Deploying LRMA theme..."

            cd /var/www/html/wp-content/themes/lrma-rock

            # Pull latest code
            git fetch origin main
            git checkout main
            git pull origin main

            # Check for PHP errors in changed files
            git diff HEAD~1 --name-only | grep '\.php$' | while read file; do
              php -l "$file" || exit 1
            done

            # Reload PHP-FPM so any opcache is cleared
            sudo systemctl reload php8.2-fpm 2>/dev/null || \
            sudo systemctl reload php8.1-fpm 2>/dev/null || \
            sudo systemctl reload php8.0-fpm 2>/dev/null || true

            # Flush WordPress rewrite rules
            wp rewrite flush --hard --path=/var/www/html/

            # Verify site is up
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://207.154.226.128/)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Site returned HTTP $STATUS after deploy"
              exit 1
            fi

            echo "✅ Deploy complete — site is up (HTTP $STATUS)"
            echo "⚠️  If migration scripts were added, run them manually:"
            echo "   bash migrations/LATEST-MIGRATION.sh"
